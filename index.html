<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated Gradient Background</title>
  <style>
    :root {
      color-scheme: dark;
      --motion-factor: 0.87; /* 70% Flow, 30% Vivid */
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020204;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .scene {
      position: relative;
      width: min(100vw, calc(100vh * 1.38));
      aspect-ratio: 1496 / 1084;
      isolation: isolate;
      overflow: hidden;
      background: #000;
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -30%;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 28% 74%, rgba(255, 35, 193, .22), transparent 24%),
        radial-gradient(circle at 76% 22%, rgba(0, 163, 255, .22), transparent 27%);
      mix-blend-mode: screen;
      filter: blur(28px);
      animation: overlayOrbit 18s linear infinite;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(circle at 50% 48%, transparent 30%, rgba(0,0,0,.18) 70%, rgba(0,0,0,.52) 100%);
    }

    .artwork {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .motion-layer {
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform, opacity;
    }

    .card-shell,
    .card-glow {
      animation: none !important;
      transform: none !important;
      translate: none !important;
    }

    .modal-blur {
      display: block;
      pointer-events: none;
    }

    .modal-blur > div {
      background: rgba(5, 8, 18, .08);
      -webkit-backdrop-filter: blur(16px) saturate(125%);
      backdrop-filter: blur(16px) saturate(125%);
    }

    .card-base {
      fill: #080b14 !important;
      fill-opacity: .34;
      stroke: rgba(255, 255, 255, .28);
      stroke-width: 1.35px;
    }

    .card-glow {
      opacity: .62;
    }

    .layer-a { animation: orbitA calc(12s * var(--motion-factor)) ease-in-out infinite alternate; }
    .layer-b { animation: orbitB calc(15s * var(--motion-factor)) cubic-bezier(.42,0,.58,1) infinite; }
    .layer-c { animation: orbitC calc(13s * var(--motion-factor)) ease-in-out infinite alternate; }
    .layer-d { animation: orbitD calc(17s * var(--motion-factor)) cubic-bezier(.45,.05,.55,.95) infinite; }

    @keyframes orbitA {
      0%   { transform: translate(-7%, 8%) rotate(-7deg) scale(1.04); opacity: .78; }
      45%  { transform: translate(8%, -5%) rotate(8deg) scale(1.17); opacity: 1; }
      100% { transform: translate(-2%, -13%) rotate(-3deg) scale(1.08); opacity: .88; }
    }

    @keyframes orbitB {
      0%   { transform: translate(12%, 6%) rotate(0deg) scale(.98); opacity: .30; }
      35%  { transform: translate(-9%, -13%) rotate(11deg) scale(1.18); opacity: .58; }
      70%  { transform: translate(-2%, 10%) rotate(-8deg) scale(1.09); opacity: .42; }
      100% { transform: translate(12%, 6%) rotate(0deg) scale(.98); opacity: .30; }
    }

    @keyframes orbitC {
      0%   { transform: translate(8%, -11%) rotate(8deg) scale(1.08); opacity: .84; }
      50%  { transform: translate(-11%, 5%) rotate(-9deg) scale(1.21); opacity: 1; }
      100% { transform: translate(5%, 13%) rotate(5deg) scale(1.02); opacity: .78; }
    }

    @keyframes orbitD {
      0%   { transform: translate(-13%, -4%) rotate(0deg) scale(1.02); opacity: .28; }
      30%  { transform: translate(8%, 10%) rotate(-10deg) scale(1.22); opacity: .55; }
      65%  { transform: translate(11%, -10%) rotate(8deg) scale(1.12); opacity: .40; }
      100% { transform: translate(-13%, -4%) rotate(0deg) scale(1.02); opacity: .28; }
    }

    @keyframes overlayOrbit {
      0%   { transform: rotate(0deg) scale(1); filter: blur(28px) hue-rotate(0deg); }
      50%  { transform: rotate(180deg) scale(1.12); filter: blur(34px) hue-rotate(90deg); }
      100% { transform: rotate(360deg) scale(1); filter: blur(28px) hue-rotate(0deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 1ms !important; animation-iteration-count: 1 !important; }
    }

  </style>
</head>
